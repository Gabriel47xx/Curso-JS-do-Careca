<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <form action="" id="formulario">
            <h1 id="title">Calculadora de IMC</h1>
            <h2 id="subTitle">Índice de Massa Corporal</h2>
            <div>
                <label for="nome">Nome<br></label>
                <input type="text" id="nome" autofocus required>
            </div>
            <div>
                <label for="idade">Idade<br></label>
                <input type="number" name="" id="idade" required>
            </div>
            <div>
                <label for="peso">Peso<br></label>
                <input type="number" id="peso"
                step="0.1"
                required>
            </div>
            <div>
                <label for="altura">Altura<br></label>
                <input type="number" id="altura"
                step="0.01" required>
            </div>
            <div>
                <button type="submit" id="btnEnviar">Enviar</button>
                <button type="reset" id="btnLimpar">Limpar</button>
            </div>
            <div>
                <label for="imc">IMC</label>
                <input type="text" id="resultadoImc" readonly value="0.0">
                <span id="aviso"></span>
            </div>
            <div id="result">
                <h2>Resultado</h2>
                <p id="resultado"></p>
                <img id="imgSituacao" src="" alt="">
        
            </div>
        </form>
    </section>



    <script src="script.js"></script>
</body>
</html>
